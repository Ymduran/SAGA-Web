<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunidad — Acceso</title>
  <link rel="stylesheet" type="text/css" href="../css/login.css">
</head>
<body>
  <div class="login-page">
    <div class="card">
      <div class="card__inner">
        <span class="brand">SAGA — Acceso</span>
        <form>
          <div class="form-group">
            <label for="usuario">Usuario</label>
            <input id="usuario" name="usuario" type="text" placeholder="Ingresa tu usuario" autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="contrasena">Contraseña</label>
            <input id="contrasena" name="contrasena" type="password" placeholder="Ingresa tu contraseña" autocomplete="current-password" />
          </div>
          <button type="submit">Iniciar Sesión</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
