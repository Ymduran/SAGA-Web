<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SAGA - Registros</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS del header -->
    <link rel="stylesheet" href="/public/css/header.css">
    
    <!-- CSS propio -->
    <link rel="stylesheet" href="/public/css/reportes.css">

    
</head>
<body>

<!-- SIDEBAR DINÁMICO -->
<div id="header"></div>

<!-- NAVBAR SUPERIOR -->
<div class="topbar">
    <h5>Sistema Automatizado de Gestión de Asistencias (SAGA)</h5>
</div>

<!-- CONTENIDO -->
<div class="search-section">

    <div class="search-box text-center">
        <h6 class="mb-3">Buscar por Nombre o ID</h6>

        <div class="input-group mb-3">
            <input type="text" class="form-control" placeholder="Ingrese nombre o ID...">
            <button class="btn btn-primary">Buscar</button>
        </div>

        <div class="result-placeholder">
            Utilice el campo de búsqueda para encontrar un miembro
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Cargar Sidebar -->
<script>
fetch("/public/src/components/header.html")
    .then(response => response.text())
    .then(data => {
        document.getElementById("header").innerHTML = data;

        const currentPage = window.location.pathname.split("/").pop();
        const links = document.querySelectorAll(".nav-link");

        links.forEach(link => {
            const linkPage = link.getAttribute("href").split("/").pop();

            if (linkPage === currentPage) {
                link.classList.add("active");
            }
        });
    });
</script>
<script src="../public/js/buscador.js"></script>
</body>
</html>
