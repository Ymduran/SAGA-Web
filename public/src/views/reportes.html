<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SAGA - Reportes</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS del header -->
    <link rel="stylesheet" href="/public/css/header.css">
    
    <!-- CSS propio -->
    <link rel="stylesheet" href="/public/css/reportes.css">
</head>
<body>

<!-- SIDEBAR DINÁMICO -->
<div id="header-placeholder"></div>

<!-- NAVBAR SUPERIOR DE SAGA -->
<div class="topbar">
    <h5>Sistema Automatizado de Gestión de Asistencias (SAGA)</h5>
</div>

<!-- CONTENIDO -->
<div class="page-content">

    <h5 class="mb-4">Reportes y Transparencia</h5>

    <!-- FILTROS -->
    <div class="card card-custom mb-4">
        <div class="card-body">
            <h6 class="mb-3">Controles de Filtrado</h6>

            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">Reunión</label>
                    <select class="form-select" id="filtroReunion">
                        <option value="">Seleccione una reunión</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- GRÁFICA -->
    <div class="card card-custom mb-4">
        <div class="card-body">
            <h6 class="mb-3">Asistencia General vs. Ausencia</h6>
            <canvas id="asistenciaChart" height="100"></canvas>
        </div>
    </div>

    <!-- BOTÓN EXPORTAR -->
    <div class="d-flex justify-content-end gap-2 mb-3">
        <button class="btn btn-success" id="btnExportarExcel">Exportar a Excel</button>
        <button class="btn btn-danger" id="btnExportarPdf">Exportar a PDF</button>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Librerías de exportación -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@latest/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@latest/dist/jspdf.plugin.autotable.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Scripts propios -->
<script src="/public/js/auth.js"></script>
<script src="/public/js/layout.js"></script>
<script src="/public/js/reportes.js"></script>
</body>
</html>
