<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SAGA - Registros</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS del header -->
    <link rel="stylesheet" href="/public/css/header.css">
    
    <!-- CSS propio -->
    <link rel="stylesheet" href="/public/css/reportes.css">

    
</head>
<body>

<!-- SIDEBAR DINÁMICO -->
<div id="header-placeholder"></div>

<!-- NAVBAR SUPERIOR -->
<div class="topbar">
    <h5>Sistema Automatizado de Gestión de Asistencias (SAGA)</h5>
</div>

<!-- CONTENIDO -->
<div class="page-content">

    <h5 class="mb-4">Reportes y Transparencia</h5>

    <!-- FILTROS -->
    <div class="card card-custom mb-4">
        <div class="card-body">
            <h6 class="mb-3">Controles de Filtrado</h6>

            <div class="row g-3 align-items-end">

                <div class="col-md-4">
                    <label class="form-label">Reunión</label>
                    <select class="form-select" id="filtroReunion">
                        <option value="">Todas las reuniones</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Fecha Inicial</label>
                    <input type="date" class="form-control" id="fechaInicial">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Fecha Final</label>
                    <input type="date" class="form-control" id="fechaFinal">
                </div>

                <div class="col-md-2">
                    <button class="btn btn-primary w-100" id="btnAplicarFiltros">Aplicar Filtros</button>
                </div>

            </div>
        </div>
    </div>

    <!-- GRÁFICA -->
    <div class="card card-custom mb-4">
        <div class="card-body">
            <h6 class="mb-3">Asistencia General vs. Ausencia</h6>
            <canvas id="asistenciaChart" height="100"></canvas>
        </div>
    </div>

    <!-- BOTÓN EXPORTAR -->
    <div class="text-end">
        <button class="btn btn-export">
            Exportar a PDF / Excel
        </button>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/public/js/layout.js"></script>
<script src="/public/js/reportes.js"></script>
</body>
</html>
