<div class="card shadow-sm border-0 mb-4">
    <div class="card-body d-flex justify-content-between align-items-center">
        <div>
            <h4 class="mb-0">Calendario de Reuniones</h4>
            <p class="text-muted small mb-0">Gestiona y crea nuevos eventos de asistencia</p>
        </div>
        <button class="btn btn-success px-4" data-bs-toggle="modal" data-bs-target="#modalNuevaReunion">
            <i class="bi bi-plus-lg"></i> Nueva Reunión
        </button>
    </div>
</div>

<div class="card shadow-sm border-0">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="bg-light">
                <tr>
                    <th>ID</th>
                    <th>Evento</th>
                    <th>Fecha</th>
                    <th>Descripción</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaReuniones">
                </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modalNuevaReunion" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title">Programar Reunión</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formReunion">
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Nombre de la Reunión</label>
                        <input type="text" class="form-control" id="nombreReunion" placeholder="Ej. Asamblea General Abril" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Fecha</label>
                        <input type="date" class="form-control" id="fechaReunion" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Descripción Corta</label>
                        <textarea class="form-control" id="descReunion" rows="3" placeholder="Detalles del evento..."></textarea>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary">Crear Reunión</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
