<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SAGA - Reuniones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/header.css">
    <link rel="stylesheet" href="/public/css/reuniones.css">
</head>
<body>
<div id="header-placeholder"></div>
<div class="topbar">
    <h5>Sistema Automatizado de Gestión de Asistencias (SAGA)</h5>
</div>
<div class="content">
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h4 class="mb-0">Calendario de Reuniones</h4>
                <p class="text-muted small mb-0">Gestiona y crea nuevos eventos de asistencia</p>
            </div>
            <button class="btn btn-success px-4" data-bs-toggle="modal" data-bs-target="#modalNuevaReunion">
                Nueva Reunión
            </button>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th>ID</th>
                        <th>Evento</th>
                        <th>Fecha</th>
                        <th>Descripción</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaReuniones"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalNuevaReunion" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title">Programar Reunión</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formReunion">
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Nombre de la Reunión</label>
                        <input type="text" class="form-control" id="nombreReunion" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Fecha</label>
                        <input type="date" class="form-control" id="fechaReunion" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Descripción Corta</label>
                        <textarea class="form-control" id="descReunion" rows="3"></textarea>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary">Crear Reunión</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalEditarReunion" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title">Editar Reunión</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formEditarReunion">
                    <input type="hidden" id="editarReunionId">
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Nombre de la Reunión</label>
                        <input type="text" class="form-control" id="editarNombreReunion" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Fecha</label>
                        <input type="date" class="form-control" id="editarFechaReunion" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Descripción Corta</label>
                        <textarea class="form-control" id="editarDescReunion" rows="3"></textarea>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/public/js/layout.js"></script>
<script src="/public/js/reuniones.js"></script>
</body>
</html>
