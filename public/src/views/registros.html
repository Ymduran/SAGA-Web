<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SAGA - Registros</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS del header -->
    <link rel="stylesheet" href="/public/css/header.css">
    
    <!-- CSS propio -->
    <link rel="stylesheet" href="/public/css/forms.css">
    <link rel="stylesheet" href="/public/css/registros.css">
</head>
<body>

<!-- SIDEBAR DINÁMICO -->
<div id="header-placeholder"></div>

<!-- NAVBAR SUPERIOR DE SAGA -->
<div class="topbar">
    <h5>Sistema Automatizado de Gestión de Asistencias (SAGA)</h5>
</div>

<!-- CONTENIDO -->
<div class="search-section">

    <div class="search-box text-center">
        <h6 class="mb-3">Registro de Asistencia</h6>

        <div class="mb-3">
            <select class="form-select" id="reunionSelect"></select>
        </div>

        <div class="input-group mb-3">
            <input type="text" class="form-control" id="searchInput" placeholder="Ingrese nombre...">
            <button class="btn btn-primary" id="btnBuscar">Buscar</button>

            <!-- Lista de sugerencias -->
            <div id="sugerencias" class="list-group position-absolute w-100" style="top: 100%; z-index: 1000;"></div>
        </div>

        <div class="result-placeholder p-0 border-0 bg-transparent">
            <div style="max-height:420px; overflow-y:auto;">
                <table class="table table-striped mt-3 mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Teléfono</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAsistencias">
                        <tr>
                            <td colspan="5">Seleccione una reunión para iniciar.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Cargar Sidebar -->
<script src="/public/js/auth.js"></script>
<script src="/public/js/layout.js"></script>
<script src="/public/js/registros.js"></script>
</body>
</html>
