<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SAGA - Gestión de Ciudadanos</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS del header -->
    <link rel="stylesheet" href="/public/css/header.css">
    
    <!-- CSS propio -->
    <link rel="stylesheet" href="/public/css/ciudadanos.css">
</head>
<body>
<div id="header-placeholder"></div>

<!-- NAVBAR SUPERIOR DE SAGA -->
<div class="topbar">
    <h5>Sistema Automatizado de Gestión de Asistencias (SAGA)</h5>
</div>

<div class="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>Gestión de Ciudadanos</h4>

        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalAgregar">
            + Agregar Nuevo Ciudadano
        </button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Fecha de Ingreso</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaCiudadanos"></tbody>
            </table>
        </div>
    </div>

</div>

<!-- ===================== MODAL AGREGAR ===================== -->
<div class="modal fade" id="modalAgregar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Agregar Nuevo Ciudadano</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formAgregarCiudadano">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="agregarNombre" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="tel" class="form-control" id="agregarTelefono" required
                               inputmode="numeric" maxlength="10" pattern="[0-9]{10}"
                               title="10 dígitos, sin espacios (ej. 9516668896)"
                               placeholder="9516668896">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary" id="btnGuardarCiudadano">Guardar</button>
            </div>
        </div>
    </div>
</div>

<!-- ===================== MODAL EDITAR ===================== -->
<div class="modal fade" id="modalEditar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Ciudadano</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form>
                    <input type="hidden" id="editarId">

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" id="editarNombre" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="tel" id="editarTelefono" class="form-control" required
                               inputmode="numeric" maxlength="10" pattern="[0-9]{10}"
                               title="10 dígitos, sin espacios (ej. 9516668896)"
                               placeholder="9516668896">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary" id="btnActualizarCiudadano">Guardar Cambios</button>
            </div>
        </div>
    </div>
</div>

<!-- ===================== MODAL ELIMINAR ===================== -->
<div class="modal fade" id="modalEliminar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Confirmar Eliminación</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="mensajeEliminar"></p>
                <input type="hidden" id="eliminarId">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-danger" id="btnEliminarCiudadano">Eliminar</button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="/public/js/auth.js"></script>
<script src="/public/js/layout.js"></script>
<script src="/public/js/ciudadanos.js"></script>

</body>
</html>
